version: '3.8'

services:
  readrecall-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: readrecall-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DB_HOST=1Panel-mysql-OHb5
      - DB_PORT=3306
      - DB_USER=readrecall
      - DB_PASSWORD=readrecall_2024
      - DB_NAME=reading_reflection
      - JWT_SECRET=readcall_jwt_secret_2024_secure
      - ZHIPU_API_KEY=dc9bf8defa2e47dd95a612fd16e9b3f0.hy4T83eTbaVcWKtY
      - ZHIPU_MODEL=glm-4-flash
    networks:
      - 1panel-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  1panel-network:
    external: true
